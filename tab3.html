<!-- code uses chart.js and chartjs-plugin-datalabels.js (provided in HTML example) -->

<h1 style="color: black; text-align: center;">-Colors Example-</h1>
<div class="line1">Hello There</div>
<div class="line2">Hi Again</div>
<div style="width: 300px; height: 300px; margin: 20px auto;">
  <canvas id="myPieChart"></canvas>
</div>

<script>
  Chart.register(ChartDataLabels)
  var ctx = document.getElementById('myPieChart').getContext('2d')
  new Chart(ctx, {
    type: 'pie',
    data: {
      labels: ['Roses', 'Violets', 'Tulips'],
      datasets: [{
        data: [300, 500, 100],
        backgroundColor: ['#d65061', '#cc86e3', '#f2d974']
      }]
    },
    options: {
      plugins: {
        legend: { display: false },
        datalabels: {
          color: 'black',
          anchor: 'end',
          align: 'end',
          offset: 10,
          font: { weight: 'bold', size: 14 }
        }
      },
      layout: { padding: 20 }
    }
  })
</script>
